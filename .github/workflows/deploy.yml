name: Deploy Portfolio to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker Image
      run: docker build -t chinmaykhairnar/chinmay-portfolio:latest .

    - name: Push Image to Docker Hub
      run: docker push chinmaykhairnar/chinmay-portfolio:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull chinmaykhairnar/chinmay-portfolio:latest
          docker stop $(docker ps -q) || true
          docker rm $(docker ps -aq) || true
          docker run -d -p 80:80 chinmaykhairnar/chinmay-portfolio:latest
